name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: NoxMic-Pro.exe
            bundle_name: Windows-Build
          - os: ubuntu-latest
            artifact_name: NoxMic-Pro.bin
            bundle_name: Linux-Build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PortAudio (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev libasound2-dev python3-dev
          pip install -r requirements.txt

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install -r requirements.txt

      - name: Build Windows EXE
        if: runner.os == 'Windows'
        run: |
          python -m nuitka --standalone --onefile --enable-plugin=pyside6 --windows-console-mode=disable --include-data-files="MaterialSymbolsRounded.ttf=./" --include-data-files="icon.ico=./" --windows-icon-from-ico=icon.ico main.py -o ${{ matrix.artifact_name }}

      - name: Build Linux Binary
        if: runner.os == 'Linux'
        run: |
          python -m nuitka --standalone --onefile --enable-plugin=pyside6 --include-data-files="MaterialSymbolsRounded.ttf=./" --include-data-files="icon.ico=./" main.py -o ${{ matrix.artifact_name }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bundle_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-Build

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Linux-Build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            NoxMic-Pro.exe
            NoxMic-Pro.bin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}